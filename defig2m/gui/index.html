<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vybe Portfolio</title>
    <meta
      name="description"
      content="Vybe portfolio showcase: wallet balances and DeFi positions."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="gui.css?v=30" />
    <link rel="stylesheet" href="defi-tables.css?v=30" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="wallet-chip">
          <span class="wallet-avatar" aria-hidden="true"></span>
          <span id="walletLabel">—</span>
          <span class="connected" id="connectedBadge" hidden>Connected</span>
        </div>
        <div class="top-actions">
          <button type="button" class="icon-btn" id="refreshBtn" title="Refresh">↻</button>
          <a class="text-link" href="/">GTM</a>
        </div>
      </header>

      <section class="search-bar">
        <form id="walletForm" autocomplete="off">
          <input
            id="wallet"
            type="text"
            spellcheck="false"
            placeholder="Solana wallet address"
            value="tEsT1vjsJeKHw9GH5HpnQszn2LWmjR6q1AVCDCj51nd"
          />
          <button type="submit" id="loadBtn" class="btn-lime">Load</button>
        </form>
        <p class="search-hint">
          Load a Solana wallet to view spot holdings and DeFi positions.
        </p>
        <div class="sample-wallets" id="sampleWallets"></div>
      </section>
      <div class="view-switch" id="viewSwitch" hidden role="tablist" aria-label="Portfolio view">
        <button type="button" class="view-btn active" data-view="holdings" role="tab" aria-selected="true">
          <span class="view-btn-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16"><rect x="2.8" y="5" width="10.4" height="7.5" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="11" cy="8.8" r="0.9" fill="currentColor"/></svg>
          </span>
          Spot Holdings
        </button>
        <button type="button" class="view-btn" data-view="defi" role="tab" aria-selected="false">
          <span class="view-btn-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16"><path d="M3.5 11.5 6.2 7.8l2.1 1.7 3.2-4.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.5 12.5h9" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          </span>
          DeFi Positions
        </button>
      </div>

      <div class="toolbar" id="toolbar" hidden>
        <label class="dust-toggle"><input type="checkbox" id="hideDust" checked /> Hide dust (&lt; $0.10)</label>
        <span class="status" id="status">—</span>
      </div>
      <p class="error" id="error" hidden></p>

      <section class="hero" id="hero" hidden>
        <div class="hero-left">
          <p class="label" id="heroLabel">Net Worth</p>
          <div class="net-row">
            <h1 id="netWorth">—</h1>
            <span class="sol-eq" id="netWorthSol">—</span>
          </div>
          <p class="delta" id="netDelta">—</p>
          <div class="hero-pills">
            <div class="pill"><span>Spot Holdings</span><strong id="spotUsd">—</strong></div>
            <div class="pill"><span>DeFi Holdings</span><strong id="defiUsd">—</strong></div>
            <div class="pill"><span>Claimable</span><strong id="claimableUsd">—</strong></div>
          </div>
        </div>
        <section class="bands" id="bands" hidden>
          <h3 id="bandsTitle">USD value bands</h3>
          <div class="band-list" id="bandList"></div>
        </section>
        <div class="hero-right">
          <canvas id="allocCanvas" width="280" height="160" aria-label="Allocation"></canvas>
          <ul class="chart-legend" id="chartLegend"></ul>
        </div>
      </section>

      <section class="stats" id="stats" hidden></section>

      <section class="chips" id="protocolChips" hidden></section>

      <section class="content" id="content" hidden></section>
    </div>
    <script src="gui.js?v=30" type="module"></script>
  </body>
</html>
